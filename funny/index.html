<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Funny Skits</title>

  <style>
    :root {
      --blue: #4a5cff;   /* slightly purple blue, ~60% brightness */
      --yellow: #ffd447; /* rich yellow, ~60% brightness */
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--blue);
      overflow: hidden;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Video takes up 85% of the screen */
    #video-container {
      height: 85vh;
      width: 100vw;
      display: flex;
      justify-content: center;
      align-items: center;
      background: #000;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    /* Bottom control bar */
    #controls {
      height: 15vh;
      width: 100vw;
      display: flex;
      justify-content: space-around;
      align-items: center;
      background: var(--blue);
    }

    button {
      background: var(--yellow);
      color: var(--blue);
      border: none;
      padding: 14px 28px;
      font-size: 20px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: bold;
    }

    button:active {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div id="video-container">
    <iframe id="player" allowfullscreen></iframe>
  </div>

  <div id="controls">
    <button id="backBtn">Back</button>
    <button id="nextBtn">Next</button>
  </div>

  <script>
    let videos = [];
    let index = 0;

    // Load JSON file (must be in same folder as this HTML)
    fetch("funny.json")
      .then(response => response.json())
      .then(data => {
        videos = data.videos;
        loadVideo();
      });

    function loadVideo() {
      // First video: no autoplay
      // Others: autoplay muted
      const autoplay = index === 0 ? "" : "?autoplay=1&mute=1";
      document.getElementById("player").src = videos[index] + autoplay;
    }

    document.getElementById("nextBtn").addEventListener("click", () => {
      index = (index + 1) % videos.length;
      loadVideo();
    });

    document.getElementById("backBtn").addEventListener("click", () => {
      index = (index - 1 + videos.length) % videos.length;
      loadVideo();
    });
  </script>

</body>
</html>
