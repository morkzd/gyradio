<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Funny Skits</title>

  <style>
    :root {
      --blue: #4a5cff;   /* slightly purple blue */
      --yellow: #ffd447; /* rich yellow */
    }

    body {
      margin: 0;
      padding: 0;
      background: var(--blue);
      overflow: hidden;
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* Video takes up 85% of the screen */
    #video-container {
      flex: 0 0 85vh;
      width: 100vw;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #player {
      width: 100%;
      height: 100%;
    }

    /* Controls sit directly under the video */
    #controls {
      flex: 0 0 auto;
      width: 100vw;
      background: var(--blue);
      display: flex;
      justify-content: space-around;
      align-items: center;
      padding: 14px 0;
    }

    button {
      background: var(--yellow);
      color: var(--blue);
      border: none;
      padding: 18px 34px;
      font-size: 24px;   /* bigger text */
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    button:active {
      opacity: 0.8;
    }
  </style>
</head>

<body>

  <div id="video-container">
    <div id="player"></div>
  </div>

  <div id="controls">
    <button id="backBtn">Back</button>
    <button id="shuffleBtn">Shuffle</button>
    <button id="nextBtn">Next</button>
  </div>

  <!-- Load YouTube Player API -->
  <script src="https://www.youtube.com/iframe_api"></script>

  <script>
    let videos = [];
    let index = 0;
    let player;
    let soundUnlocked = false;

    // Load JSON file
    fetch("funny.json")
      .then(response => response.json())
      .then(data => {
        videos = data.videos;
      });

    // YouTube API creates the player
    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        height: "100%",
        width: "100%",
        videoId: "",
        playerVars: {
          playsinline: 1,
          cc_load_policy: 1   // <-- FORCE CAPTIONS ON
        }
      });

      player.addEventListener("onReady", () => {
        loadVideo();
      });
    }

    function loadVideo() {
      const videoId = videos[index].split("/embed/")[1];

      const autoplay = index === 0 ? 0 : 1;

      player.loadVideoById({
        videoId: videoId,
        startSeconds: 0
      });

      if (autoplay === 1) {
        if (soundUnlocked) {
          player.unMute();
        } else {
          player.mute();
        }
      }
    }

    function unlockSound() {
      if (!soundUnlocked) {
        soundUnlocked = true;
        player.unMute();
      }
    }

    document.getElementById("nextBtn").addEventListener("click", () => {
      unlockSound();
      index = (index + 1) % videos.length;
      loadVideo();
    });

    document.getElementById("backBtn").addEventListener("click", () => {
      unlockSound();
      index = (index - 1 + videos.length) % videos.length;
      loadVideo();
    });

    document.getElementById("shuffleBtn").addEventListener("click", () => {
      unlockSound();
      let newIndex;
      do {
        newIndex = Math.floor(Math.random() * videos.length);
      } while (newIndex === index);

      index = newIndex;
      loadVideo();
    });
  </script>

</body>
</html>
